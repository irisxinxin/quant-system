<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>量化仪表盘</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lightweight-charts@4.2.0/dist/lightweight-charts.standalone.production.js"></script>
<style>
:root {
  --bg:       #0e1117;
  --s1:       #161b22;
  --s2:       #21262d;
  --s3:       #2d333b;
  --border:   rgba(255,255,255,0.08);
  --border2:  rgba(255,255,255,0.15);
  --text:     #f0f6fc;
  --text2:    #8b949e;
  --text3:    #484f58;
  --accent:   #f59e0b;
  --green:    #3fb950;
  --green2:   #238636;
  --red:      #f85149;
  --blue:     #58a6ff;
  --cyan:     #39c5cf;
  --purple:   #bc8cff;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'Inter',system-ui,-apple-system,sans-serif;font-size:14px;line-height:1.5;min-height:100vh}
a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer;border:none;background:none}

/* ── Layout ── */
.wrap{max-width:1400px;margin:0 auto;padding:0 16px}

/* ── Cards ── */
.card{
  background:var(--s1);
  border:1px solid var(--border);
  border-radius:12px;
  box-shadow:inset 0 1px 0 rgba(255,255,255,0.04);
}
.card-hover{transition:transform .2s ease,box-shadow .2s ease}
.card-hover:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,0.35)}

/* ── Badges ── */
.badge{display:inline-flex;align-items:center;font-size:11px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;padding:2px 8px;border-radius:20px;border:1px solid;white-space:nowrap}
.bg{color:#4ade80;background:rgba(74,222,128,.12);border-color:rgba(74,222,128,.25)}
.by{color:#fbbf24;background:rgba(251,191,36,.12);border-color:rgba(251,191,36,.25)}
.br{color:#f87171;background:rgba(248,113,113,.12);border-color:rgba(248,113,113,.25)}
.bk{color:#8b949e;background:rgba(139,148,158,.08);border-color:rgba(139,148,158,.15)}
.bb{color:#58a6ff;background:rgba(88,166,255,.12);border-color:rgba(88,166,255,.25)}
.bc{color:#39c5cf;background:rgba(57,197,207,.12);border-color:rgba(57,197,207,.25)}

/* ── Tabs ── */
.tab-bar{display:flex;gap:0;overflow-x:auto;border-bottom:1px solid var(--border)}
.tab-bar::-webkit-scrollbar{display:none}
.tab-btn{padding:12px 18px;font-size:13px;font-weight:500;color:var(--text2);border-bottom:2px solid transparent;transition:color .15s,border-color .15s;white-space:nowrap}
.tab-btn:hover{color:#c9d1d9}
.tab-btn.on{color:var(--accent);border-bottom-color:var(--accent)}

/* ── Sub-tabs ── */
.stab{padding:5px 12px;font-size:12px;font-weight:500;color:var(--text2);border:1px solid var(--border);border-radius:20px;transition:all .15s}
.stab:hover{border-color:var(--border2);color:#c9d1d9}
.stab.on{background:rgba(245,158,11,.12);color:var(--accent);border-color:rgba(245,158,11,.3)}

/* ── Tables ── */
.tbl{width:100%;border-collapse:collapse;font-size:12px}
.tbl th{text-align:right;padding:8px 12px;color:var(--text2);font-size:11px;font-weight:500;border-bottom:1px solid var(--border);letter-spacing:.04em;text-transform:uppercase;white-space:nowrap}
.tbl th.tl,.tbl td.tl{text-align:left}
.tbl td{padding:9px 12px;text-align:right;border-bottom:1px solid rgba(255,255,255,0.03);white-space:nowrap;vertical-align:middle}
.tbl tbody tr:hover{background:rgba(255,255,255,0.025)}
.tbl tbody tr:last-child td{border-bottom:none}
.clickable{cursor:pointer}
.detail-row{display:none;background:rgba(0,0,0,.25)}
.detail-row.open{display:table-row}

/* ── Skeleton shimmer ── */
@keyframes shimmer{0%{background-position:-400px 0}100%{background-position:400px 0}}
.sk{background:linear-gradient(90deg,var(--s1) 25%,var(--s2) 50%,var(--s1) 75%);background-size:800px 100%;animation:shimmer 1.6s infinite;border-radius:6px;display:inline-block}

/* ── Spinner ── */
@keyframes spin{to{transform:rotate(360deg)}}
.spin{animation:spin .8s linear infinite;display:inline-block}

/* ── CTA bar ── */
.bar-track{height:3px;background:rgba(255,255,255,.07);border-radius:2px;overflow:hidden;flex-shrink:0}
.bar-fill{height:100%;border-radius:2px;transition:width .4s ease}

/* ── Metric pill (macro strip) ── */
.mpill{display:flex;align-items:center;gap:6px;padding:5px 12px;background:var(--s1);border:1px solid var(--border);border-radius:8px;font-size:12px;white-space:nowrap;box-shadow:inset 0 1px 0 rgba(255,255,255,0.04)}

/* ── Mono ── */
.mono{font-family:'JetBrains Mono','SF Mono',monospace}

/* ── Refresh button ── */
.ref-btn{padding:7px 16px;background:rgba(245,158,11,.1);color:var(--accent);border:1px solid rgba(245,158,11,.25);border-radius:8px;font-size:12px;font-weight:500;transition:all .15s}
.ref-btn:hover{background:rgba(245,158,11,.18);border-color:rgba(245,158,11,.4)}
.ref-btn:disabled{opacity:.4;cursor:not-allowed}
.ref-btn:active{transform:scale(.97)}

/* ── Responsive ── */
@media(max-width:600px){.hxs{display:none}}
@media(max-width:768px){.hsm{display:none}}
@media(max-width:960px){.hmd{display:none}}

/* ── Scrollbar ── */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,0.18)}
</style>
</head>
<body>

<!-- ═══ HEADER ═══ -->
<header style="position:sticky;top:0;z-index:100;background:var(--bg);border-bottom:1px solid var(--border);backdrop-filter:blur(12px)">
  <div class="wrap" style="height:52px;display:flex;align-items:center;justify-content:space-between">
    <div style="display:flex;align-items:center;gap:12px">
      <span style="font-size:16px;font-weight:700;color:var(--accent);letter-spacing:-.01em">⚡ 量化仪表盘</span>
      <span id="lastUpd" style="font-size:11px;color:var(--text3)"></span>
    </div>
    <button class="ref-btn" id="refBtn" onclick="refreshAll()">⟳ 刷新数据</button>
  </div>
</header>

<!-- ═══ MACRO STRIP ═══ -->
<div id="macroWrap" style="background:#0b0f16;border-bottom:1px solid var(--border);position:sticky;top:52px;z-index:90">
  <div class="wrap" style="padding:8px 16px;display:flex;gap:8px;overflow-x:auto;align-items:center">
    <div class="mpill" style="color:var(--text3);font-size:12px">
      <span class="spin">⟳</span> 加载宏观数据...
    </div>
  </div>
</div>

<!-- ═══ MAIN TABS ═══ -->
<div class="tab-bar" style="background:var(--bg);position:sticky;top:89px;z-index:80">
  <div class="wrap" style="display:flex">
    <button class="tab-btn on" id="tab-scan"    onclick="sw('scan')">📈 信号扫描</button>
    <button class="tab-btn"    id="tab-sectors" onclick="sw('sectors')">🗺 板块追踪</button>
    <button class="tab-btn"    id="tab-cta"     onclick="sw('cta')">🌐 CTA宏观</button>
    <button class="tab-btn"    id="tab-bt"      onclick="sw('bt')">📊 回测验证</button>
  </div>
</div>

<!-- ═══ CONTENT ═══ -->
<main class="wrap" style="padding:20px 16px 48px">

  <!-- TAB 1: 信号扫描 -->
  <div id="pane-scan">
    <div id="scanBody">
      <div style="text-align:center;padding:64px 0;color:var(--text2)">
        <div style="font-size:40px;margin-bottom:16px;opacity:.4">📡</div>
        <div style="font-size:14px;margin-bottom:24px">扫描全部自选股信号，约需 30 秒</div>
        <button onclick="loadScan()" style="padding:10px 28px;background:rgba(245,158,11,.1);color:var(--accent);border:1px solid rgba(245,158,11,.3);border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;transition:all .15s"
          onmouseover="this.style.background='rgba(245,158,11,.18)'" onmouseout="this.style.background='rgba(245,158,11,.1)'">
          开始扫描
        </button>
      </div>
    </div>
  </div>

  <!-- TAB 2: 板块追踪 -->
  <div id="pane-sectors" style="display:none">
    <div id="sectBody">
      <div style="text-align:center;padding:64px 0;color:var(--text2)">
        <div class="spin" style="font-size:28px;display:block;margin-bottom:16px">⟳</div>
        <div style="font-size:13px">加载板块数据中...</div>
      </div>
    </div>
  </div>

  <!-- TAB 3: CTA宏观 -->
  <div id="pane-cta" style="display:none">
    <div id="ctaBody">
      <div style="text-align:center;padding:64px 0;color:var(--text2);font-size:13px">切换到此标签后自动加载</div>
    </div>
  </div>

  <!-- TAB 4: 回测验证 -->
  <div id="pane-bt" style="display:none">
    <!-- 股票选择器 -->
    <div id="bt-selector" style="margin-bottom:20px">
      <div style="font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;font-weight:600;margin-bottom:14px">选择标的 — 点击查看最优策略买卖历史</div>
      <div id="bt-grid"></div>
    </div>

    <!-- 图表区（选股后显示）-->
    <div id="bt-detail" style="display:none">
      <!-- 标题行 -->
      <div style="display:flex;align-items:center;gap:14px;margin-bottom:14px;flex-wrap:wrap">
        <span id="bt-ticker-label" style="font-size:20px;font-weight:700;color:var(--text)"></span>
        <div id="bt-strat-tabs" style="display:flex;gap:6px;flex-wrap:wrap"></div>
        <div style="margin-left:auto;display:flex;align-items:center;gap:8px">
          <span id="bt-loading-msg" style="font-size:12px;color:var(--text3)"></span>
          <button onclick="sw('bt')" style="font-size:12px;color:var(--text2);padding:4px 12px;border:1px solid var(--border);border-radius:6px;background:none;cursor:pointer">← 返回</button>
        </div>
      </div>

      <!-- 绩效指标条 -->
      <div id="bt-stats" style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px"></div>

      <!-- 策略说明卡 -->
      <div id="bt-strat-info" style="margin-bottom:16px"></div>

      <!-- K线图 -->
      <div class="card" style="padding:0;overflow:hidden;margin-bottom:16px">
        <div style="padding:12px 16px 0;display:flex;align-items:center;gap:10px">
          <span style="font-size:12px;font-weight:600;color:var(--text2)">价格 + 买卖点（近6个月）</span>
          <div style="margin-left:auto;display:flex;gap:12px;font-size:11px;color:var(--text3)">
            <span><span style="color:#58a6ff;font-size:14px">▲</span> 买入</span>
            <span><span style="color:#3fb950;font-size:14px">▼</span> 盈利卖出</span>
            <span><span style="color:#f85149;font-size:14px">▼</span> 亏损卖出</span>
          </div>
        </div>
        <div id="bt-chart" style="height:380px;width:100%"></div>
      </div>

      <!-- 交易记录 -->
      <div class="card" style="overflow:hidden">
        <div style="padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between">
          <span style="font-size:12px;font-weight:600;color:var(--text2)">交易记录（近3年，最新在前）</span>
          <span id="bt-trade-count" style="font-size:11px;color:var(--text3)"></span>
        </div>
        <div style="overflow-x:auto">
          <table class="tbl">
            <thead><tr>
              <th class="tl">买入日期</th>
              <th class="tl">卖出日期</th>
              <th>持仓天数</th>
              <th>买入价</th>
              <th>卖出价</th>
              <th>盈亏</th>
              <th class="tl">结果</th>
            </tr></thead>
            <tbody id="bt-trades-body"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

</main>

<script>
// ══════════════════════════════════════════
// State
// ══════════════════════════════════════════
const TABS = ['scan','sectors','cta','bt'];
const loaded = {scan:false, sectors:false, cta:false, bt:false};
let curTab = 'scan';
let sectView = 'momentum';
let btChart = null;
let btActiveTicker = null;
let btData = null;       // full API response
let btActiveStrat = 0;   // index into strategies[]

const BT_SECTORS = {
  "🔵 大盘/核心":      ["QQQ","SPY","GOOG","META","TSLA","AMZN"],
  "⚡ 半导体/AI算力":  ["NVDA","ASML","TSM","AMD","ARM","AVGO","AEHR","TXN","MRVL","KLAC"],
  "💾 存储":           ["MU","WDC","STX"],
  "🏗 AI电力/数据中心":["BE","VRT","ETN","GEV","PWR"],
  "🌐 光子/高速连接":  ["LITE","COHR","FN","AAOI","LWLG","VIAV","CLS","CIEN","GLW","TSEM"],
  "🚚 物流/运输":      ["ODFL","XPO","JBHT","PCAR","CMI"],
  "🏭 工业/航天制造":  ["CAT","DE","HWM","ITT","EME","AME"],
  "💰 金融":           ["MS","CBOE","TRV"],
  "🚀 太空/机器人":    ["LUNR","PL","TER","RKLB"],
};

// ══════════════════════════════════════════
// Helpers
// ══════════════════════════════════════════
const $ = id => document.getElementById(id);

function fmt(v, d=1) {
  if(v==null||isNaN(v)) return '—';
  const s = v>=0?`+${v.toFixed(d)}%`:`${v.toFixed(d)}%`;
  return s;
}

function fnum(v,d=3){
  if(v==null||isNaN(v))return'—';
  return v>=0?`+${v.toFixed(d)}`:v.toFixed(d);
}

function cPct(v,hi=2,lo=-2){
  if(v==null)return'var(--text2)';
  if(v>hi)return'#3fb950';
  if(v>0)return'#7ee787';
  if(v>lo)return'#f0a742';
  return'#f85149';
}

function cCTA(v){
  if(v==null)return'var(--text2)';
  if(v> .5)return'#3fb950';
  if(v> .15)return'#7ee787';
  if(v>-.15)return'#8b949e';
  if(v>-.5)return'#f0a742';
  return'#f85149';
}

function cCMF(v){
  if(v==null)return'var(--text2)';
  if(v>.1)return'#3fb950';
  if(v>.05)return'#7ee787';
  if(v>-.05)return'#8b949e';
  return'#f85149';
}

function cDelta(v){
  if(v==null)return'var(--text2)';
  return v>.02?'#7ee787':v<-.02?'#f0a742':'#8b949e';
}

function cVol(v){
  if(v==null)return'#8b949e';
  if(v>=2)return'#f59e0b';
  if(v>=1.5)return'#fbbf24';
  return'#484f58';
}

function sigBadge(sig){
  if(!sig)return'bk';
  if(sig.includes('🚀'))return'bg';
  if(sig.includes('↗'))return'bc';
  if(sig.includes('⚡'))return'by';
  if(sig.includes('⚠'))return'br';
  if(sig.includes('🔶'))return'by';
  return'bk';
}

function verdictBadge(code){
  return{green:'bg',yellow:'by',red:'br',gray:'bk'}[code]||'bk';
}

function loading(msg='加载中...'){
  return`<div style="text-align:center;padding:56px 0;color:var(--text2)">
    <div class="spin" style="font-size:26px;display:block;margin-bottom:14px">⟳</div>
    <div style="font-size:13px">${msg}</div>
  </div>`;
}

function errHtml(msg){
  return`<div style="text-align:center;padding:48px 0;color:#f85149;font-size:13px">❌ ${msg}</div>`;
}

// ══════════════════════════════════════════
// Tab switching
// ══════════════════════════════════════════
function sw(tab){
  curTab=tab;
  TABS.forEach(t=>{
    $('pane-'+t).style.display=t===tab?'block':'none';
    $('tab-'+t).className='tab-btn'+(t===tab?' on':'');
  });
  if(tab==='sectors'&&!loaded.sectors)loadSectors();
  if(tab==='cta'&&!loaded.cta)loadCta();
  if(tab==='bt'&&!loaded.bt)loadBt();
  // 返回回测tab时隐藏详情，显示选股器
  if(tab==='bt'){
    $('bt-detail').style.display='none';
    $('bt-selector').style.display='block';
    btActiveTicker=null;
  }
}

// ══════════════════════════════════════════
// Refresh
// ══════════════════════════════════════════
async function refreshAll(){
  const btn=$('refBtn');
  btn.innerHTML='<span class="spin">⟳</span> 刷新中';
  btn.disabled=true;
  try{
    await fetch('/api/refresh',{method:'POST'});
    Object.keys(loaded).forEach(k=>loaded[k]=false);
    loadMacro();
    if(curTab==='scan')loadScan();
    if(curTab==='sectors')loadSectors();
    if(curTab==='cta')loadCta();
  }finally{
    setTimeout(()=>{btn.innerHTML='⟳ 刷新数据';btn.disabled=false},2000);
  }
}

// ══════════════════════════════════════════
// MACRO STRIP
// ══════════════════════════════════════════
async function loadMacro(){
  try{
    const j=await(await fetch('/api/macro')).json();
    const d=j.data;
    const vc={low:'#3fb950',normal:'#8b949e',high:'#f59e0b',extreme:'#f85149'}[d.vix_status]||'#8b949e';
    let h=`<div class="mpill"><span style="color:${vc};font-weight:600">${d.vix_label||'VIX —'}</span></div>`;
    for(const[name,c]of Object.entries(d.ctas||{})){
      const col=c.value>.15?'#3fb950':c.value<-.15?'#f85149':'#8b949e';
      const arr=c.value>.15?'▲':c.value<-.15?'▼':'─';
      h+=`<div class="mpill">
        <span style="color:var(--text2);font-size:11px">${name}</span>
        <span class="mono" style="color:${col};font-weight:600">${c.value>0?'+':''}${c.value}</span>
        <span style="color:${col};font-size:10px">${arr}</span>
      </div>`;
    }
    h+=`<span style="margin-left:auto;font-size:11px;color:var(--text3)">${j.cached_at}</span>`;
    $('macroWrap').querySelector('div').innerHTML=h;
  }catch{
    $('macroWrap').querySelector('div').innerHTML='<span style="color:#f85149;font-size:12px">宏观数据加载失败</span>';
  }
}

// ══════════════════════════════════════════
// SIGNAL SCAN
// ══════════════════════════════════════════
async function loadScan(){
  $('scanBody').innerHTML=loading('扫描信号中，约 30 秒...');
  try{
    const j=await(await fetch('/api/scan')).json();
    loaded.scan=true;
    renderScan(j.data,j.cached_at);
    $('lastUpd').textContent='扫描于 '+j.cached_at;
  }catch(e){
    $('scanBody').innerHTML=errHtml('扫描失败: '+e.message);
  }
}

function renderScan(data,ts){
  let h=`<div style="font-size:11px;color:var(--text3);text-align:right;margin-bottom:16px">数据时间: ${ts}</div>`;
  for(const[grp,stocks]of Object.entries(data)){
    const ng=stocks.filter(s=>s.verdict_code==='green').length;
    const ny=stocks.filter(s=>s.verdict_code==='yellow').length;
    h+=`<div style="margin-bottom:28px">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">
        <h2 style="font-size:13px;font-weight:600;color:var(--blue)">${grp}</h2>
        <span style="font-size:11px;color:var(--text3)">${stocks.length} 只</span>
        ${ng?`<span class="badge bg">${ng} 入场</span>`:''}
        ${ny?`<span class="badge by">${ny} 关注</span>`:''}
      </div>
      <div class="card" style="overflow:hidden">
        <table class="tbl">
          <thead><tr>
            <th class="tl" style="width:88px">信号</th>
            <th class="tl" style="width:68px">股票</th>
            <th>现价</th><th>涨跌</th>
            <th class="hxs">得分</th>
            <th class="tl hsm">入场参考</th>
            <th class="hmd">CTA</th>
            <th class="hmd">RSI</th>
            <th class="hmd">量能</th>
          </tr></thead>
          <tbody>`;
    stocks.forEach((s,i)=>{
      const id=`dr-${grp.replace(/[^\w]/g,'')}-${i}`;
      const bc=verdictBadge(s.verdict_code);
      const cc=(s.price_chg||0)>=0?'#3fb950':'#f85149';
      const ctac=cCTA(s.cta_val);
      const sc=s.score||0;
      const dots=Array.from({length:7},(_,j)=>`<span style="display:inline-block;width:5px;height:5px;border-radius:50%;margin-right:2px;background:${j<sc?'#58a6ff':'rgba(255,255,255,0.08)'}"></span>`).join('');

        <td class="tl"><span class="badge ${bc}">${s.verdict||'—'}</span></td>
        <td class="tl mono" style="font-weight:700;color:var(--text);font-size:13px">${s.ticker}</td>
        <td class="mono" style="color:var(--text)">${s.price>0?'$'+s.price:'—'}</td>
        <td class="mono" style="color:${cc};font-weight:600">${s.price>0?((s.price_chg>=0?'+':'')+s.price_chg+'%'):'—'}</td>
        <td class="hxs">${dots}</td>
        <td class="tl hsm" style="color:var(--text2);max-width:200px;overflow:hidden;text-overflow:ellipsis;font-size:11px">${s.entry_zone||'—'}</td>
        <td class="mono hmd" style="color:${ctac}">${s.cta_val!=null?(s.cta_val>=0?'+':'')+s.cta_val:'—'}</td>
        <td class="mono hmd" style="color:var(--text2)">${s.rsi||'—'}</td>
        <td class="mono hmd" style="color:${cVol(s.vol_r)}">${s.vol_r?s.vol_r+'x':'—'}</td>
      </tr>
      <tr class="detail-row" id="${id}">
        <td colspan="9" style="padding:0">
          <div style="padding:14px 16px">${detailHtml(s)}</div>
        </td>
      </tr>`;
    });
    h+=`</tbody></table></div></div>`;
  }
  $('scanBody').innerHTML=h;
}

function detailHtml(s){
  if(s.error)return`<span style="color:#f85149;font-size:12px">${s.error}</span>`;
  const sigs=(s.signals||[]).map(x=>`<span style="font-size:11px;color:var(--text2);margin-right:10px">• ${x}</span>`).join('');
  const wars=(s.warnings||[]).map(x=>`<span style="font-size:11px;color:#f59e0b;margin-right:10px">⚠ ${x}</span>`).join('');
  return`<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:16px;margin-bottom:12px">
    <div>
      <div style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px">止损参考</div>
      <div class="mono" style="font-size:12px;color:#f85149">2×ATR: $${s.stop_atr}</div>
      <div class="mono" style="font-size:12px;color:#fca5a5">EMA60: $${s.stop_ema60}</div>
      <div class="mono" style="font-size:12px;color:#fca5a5">−10%: $${s.stop_pct10}</div>
    </div>
    <div>
      <div style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px">均线</div>
      <div class="mono" style="font-size:12px">EMA20: <span style="color:var(--blue)">$${s.ema20}</span></div>
      <div class="mono" style="font-size:12px">EMA60: <span style="color:var(--blue)">$${s.ema60}</span></div>
      <div class="mono" style="font-size:12px;color:var(--text2)">ATR: ${s.atr} (${s.atr_pct}%)</div>
    </div>
    <div>
      <div style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px">位置</div>
      <div class="mono" style="font-size:12px">DC20: $${s.dc20_high}</div>
      <div class="mono" style="font-size:12px">布林: ${s.bb_pct}%</div>
      <div class="mono" style="font-size:12px;color:var(--text2)">SMC: ${s.smc_val}</div>
    </div>
    <div>
      <div style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px">动量</div>
      <div class="mono" style="font-size:12px">${(s.streak||0)>0?'连涨'+(s.streak)+'天':'连跌'+Math.abs(s.streak||0)+'天'}</div>
      <div class="mono" style="font-size:12px">RS vs SMH: <span style="color:${(s.rs20||0)>0?'#3fb950':'#f85149'}">${(s.rs20||0)>0?'+':''}${s.rs20}%</span></div>
      <div class="mono" style="font-size:12px;color:var(--text2)">量能: ${s.vol_r}x</div>
    </div>
  </div>
  <div style="display:flex;flex-wrap:wrap;gap:4px">${sigs}${wars}</div>`;
}

function toggleDetail(id){

function swSect(view){

               font-size:12px;font-weight:500;color:var(--text2);cursor:pointer;transition:all .15s;font-family:inherit"
        onmouseover="this.style.borderColor='rgba(245,158,11,.4)';this.style.color='var(--accent)'"
        onmouseout="this.style.borderColor='var(--border)';this.style.color='var(--text2)'"
        >${t}</button>`;
    }
    h += `</div></div>`;
  }
  $('bt-grid').innerHTML = h;
}

async function loadBtTicker(ticker){
  btActiveTicker = ticker;
  btData = null;
  btActiveStrat = 0;
  $('bt-selector').style.display = 'none';
  $('bt-detail').style.display = 'block';
  $('bt-ticker-label').textContent = ticker;
  $('bt-strat-tabs').innerHTML = '';
  $('bt-loading-msg').textContent = '⟳ 优化中，约 20 秒...';
  $('bt-stats').innerHTML = btStatsSkeleton();
  $('bt-trades-body').innerHTML = `<tr><td colspan="7" style="text-align:center;padding:32px;color:var(--text3)"><span class="spin">⟳</span> 计算中...</td></tr>`;
  if(btChart){ btChart.remove(); btChart=null; }
  $('bt-chart').innerHTML = '';

  try{
    const j = await (await fetch(`/api/backtest/${ticker}`)).json();
    $('bt-loading-msg').textContent = '缓存于 ' + j.cached_at;
    const d = j.data;
    if(!d || d.error){
      $('bt-stats').innerHTML = `<div style="color:#f85149;font-size:13px">❌ ${d?.error||'未知错误'}</div>`;
      return;
    }
    btData = d;
    renderStratTabs(d.strategies || []);
    renderBtDetail(d.strategies[0]);
  }catch(e){
    $('bt-stats').innerHTML = `<div style="color:#f85149;font-size:13px">❌ 请求失败: ${e.message}</div>`;
  }
}

function renderStratTabs(strategies){
  $('bt-strat-tabs').innerHTML = strategies.map((s,i)=>`
    <button id="bt-stab-${i}" onclick="switchBtStrat(${i})"
      style="padding:5px 12px;font-size:11px;font-weight:500;border-radius:20px;cursor:pointer;font-family:inherit;transition:all .15s;
             ${i===0 ? 'background:rgba(245,158,11,.12);color:var(--accent);border:1px solid rgba(245,158,11,.35)'
                     : 'background:none;color:var(--text2);border:1px solid var(--border)'}">
      #${i+1} ${s.exit}
    </button>`).join('');
}

function switchBtStrat(idx){
  if(!btData || !btData.strategies) return;
  btActiveStrat = idx;
  // Update tab styles
  (btData.strategies||[]).forEach((_,i)=>{
    const btn = $('bt-stab-'+i);
    if(!btn) return;
    if(i===idx){
      btn.style.background='rgba(245,158,11,.12)';
      btn.style.color='var(--accent)';
      btn.style.borderColor='rgba(245,158,11,.35)';
    } else {
      btn.style.background='none';
      btn.style.color='var(--text2)';
      btn.style.borderColor='var(--border)';
    }
  });
  renderBtDetail(btData.strategies[idx]);
}

function btStatsSkeleton(){
  return Array(8).fill(0).map(()=>`
    <div style="padding:10px 16px;background:var(--s1);border:1px solid var(--border);border-radius:10px;min-width:90px;flex:1">
      <div class="sk" style="width:40px;height:10px;margin-bottom:6px"></div>

    </div>`).join('');
}

function getStratInfo(entry, cta, exit){
  const ei = ENTRY_INFO[entry] || { name:entry, desc:'自定义入场信号', style:'momentum' };
  const ci = CTA_INFO[cta]    || { name:cta,   desc:'宏观过滤' };
  const xi = EXIT_INFO[exit]  || { name:exit,  desc:'出场信号', style:'medium', hold:'—' };
  const entryStyle = STYLE_RISKS[ei.style] || STYLE_RISKS.momentum;
  const exitStyle  = STYLE_RISKS[xi.style] || STYLE_RISKS.medium;
  // 综合风格：优先出场风格决定持仓长度
  const styleLabel = exitStyle.label;
  const styleColor = exitStyle.color;
  const risks = [
    ...entryStyle.risks,
    ...exitStyle.risks,
    CTA_RISKS[cta] || '',
  ].filter(Boolean);
  return { ei, ci, xi, styleLabel, styleColor, risks };
}

function renderBtDetail(s){
  if(!s) return;
  const m = s.metrics || {};

  // ── 指标条 ──
  const stats = [
    {label:'近3月收益', val: m.ret_3m!=null?(m.ret_3m>=0?'+':'')+m.ret_3m.toFixed(1)+'%':'—', color:m.ret_3m>0?'#3fb950':m.ret_3m<0?'#f85149':'#8b949e'},
    {label:'近1月收益', val: m.ret_1m!=null?(m.ret_1m>=0?'+':'')+m.ret_1m.toFixed(1)+'%':'—', color:m.ret_1m>0?'#3fb950':m.ret_1m<0?'#f85149':'#8b949e'},
    {label:'1年Calmar', val: m.calmar_1y!=null?m.calmar_1y.toFixed(2):'—',                    color:m.calmar_1y>2?'#3fb950':m.calmar_1y>0.5?'#fbbf24':'#f85149'},
    {label:'Sharpe',    val: m.sharpe!=null?m.sharpe.toFixed(2):'—',                           color:m.sharpe>1?'#3fb950':m.sharpe>0?'#fbbf24':'#8b949e'},
    {label:'胜率',      val: m.win_rate!=null?m.win_rate.toFixed(1)+'%':'—',                   color:m.win_rate>55?'#3fb950':m.win_rate>40?'#fbbf24':'#f85149'},
    {label:'平均持仓',  val: m.avg_hold!=null?m.avg_hold.toFixed(0)+'天':'—',                  color:'var(--text)'},
    {label:'交易次数',  val: m.n_trades!=null?m.n_trades+'次':'—',                              color:'var(--text)'},
    {label:'在场时间',  val: m.in_market!=null?m.in_market.toFixed(0)+'%':'—',                 color:'var(--text2)'},
  ];
  $('bt-stats').innerHTML = stats.map(st=>`
    <div style="padding:10px 16px;background:var(--s1);border:1px solid var(--border);border-radius:10px;flex:1;min-width:88px">
      <div style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px">${st.label}</div>
      <div class="mono" style="font-size:16px;font-weight:600;color:${st.color}">${st.val}</div>
    </div>`).join('');

  // ── 策略说明卡 ──
  renderStratInfo(s);

  // ── K线图 ──
  renderBtChart(s.candles||[], s.markers||[], s.bah||[]);

  // ── 交易记录 ──
  const trades = s.trades || [];
  $('bt-trade-count').textContent = `共 ${trades.length} 笔`;
  if(!trades.length){
    $('bt-trades-body').innerHTML = `<tr><td colspan="7" style="text-align:center;padding:32px;color:var(--text3)">无交易记录</td></tr>`;
    return;
  }
  $('bt-trades-body').innerHTML = trades.slice(0,60).map(t=>{
    const pnl = t.pnl_pct;
    const win = pnl!=null&&pnl>0;
    const pnlCol = pnl==null?'#8b949e':win?'#3fb950':'#f85149';
    const pnlStr = pnl==null?'持仓中':(pnl>=0?'+':'')+pnl.toFixed(2)+'%';
    const badge  = pnl==null?'<span class="badge bk">持仓中</span>':win
      ?'<span class="badge bg">盈利</span>':'<span class="badge br">亏损</span>';
    return `<tr>
      <td class="tl mono" style="color:var(--blue)">${t.entry_date}</td>
      <td class="tl mono" style="color:var(--text2)">${t.exit_date||'—'}</td>
      <td style="color:var(--text2)">${t.days_held}</td>
      <td class="mono">${t.entry_px!=null?'$'+t.entry_px.toFixed(2):'—'}</td>
      <td class="mono">${t.exit_px!=null?'$'+t.exit_px.toFixed(2):'—'}</td>
      <td class="mono" style="color:${pnlCol};font-weight:600">${pnlStr}</td>
      <td class="tl">${badge}</td>
    </tr>`;
  }).join('');
}

function renderBtChart(candles, markers, bah){
  if(btChart){ btChart.remove(); btChart=null; }
  const el = $('bt-chart');
  el.innerHTML='';
  if(!candles.length){ el.innerHTML='<div style="text-align:center;padding:60px;color:var(--text3)">无K线数据</div>'; return; }

  btChart = LightweightCharts.createChart(el,{
    width: el.clientWidth||900,
    height: 380,
    layout:{ background:{color:'#161b22'}, textColor:'#8b949e' },
    grid:{ vertLines:{color:'rgba(255,255,255,0.04)'}, horzLines:{color:'rgba(255,255,255,0.04)'} },
    crosshair:{ mode:LightweightCharts.CrosshairMode.Normal },
    rightPriceScale:{ borderColor:'#21262d' },
    timeScale:{ borderColor:'#21262d', timeVisible:true },
    handleScroll:true, handleScale:true,
  });

  // ── K线 ──
  const cSeries = btChart.addCandlestickSeries({
    upColor:'#3fb950', downColor:'#f85149',
    borderUpColor:'#3fb950', borderDownColor:'#f85149',
    wickUpColor:'#3fb950', wickDownColor:'#f85149',
  });
  const validCandles = candles.filter(c=>c.open&&c.high&&c.low&&c.close);
  cSeries.setData(validCandles);

  // ── 买持基准线（归一化折线，右轴独立 priceScale）──
  if(bah && bah.length){
    const bahSeries = btChart.addLineSeries({
      color:'rgba(139,148,158,0.4)',
      lineWidth:1,
      lineStyle:2,   // dashed
      priceScaleId:'bah',
      title:'买持',
    });
    btChart.priceScale('bah').applyOptions({
      scaleMargins:{top:0.1,bottom:0.4},
      visible:false,
    });
    bahSeries.setData(bah);
  }

  // ── 买卖点 ──
  const timeSet = new Set(validCandles.map(c=>c.time));
  const mks = markers
    .filter(m=>timeSet.has(m.time))
    .sort((a,b)=>a.time<b.time?-1:1)
    .map(m=>({
      time:     m.time,
      position: m.type==='buy'?'belowBar':'aboveBar',
      color:    m.type==='buy'?'#58a6ff':(m.pnl!=null&&m.pnl>0?'#3fb950':'#f85149'),
      shape:    m.type==='buy'?'arrowUp':'arrowDown',
      text:     m.text||'',
      size:     1.5,
    }));
  cSeries.setMarkers(mks);

  // ── 成交量 ──
  const vSeries = btChart.addHistogramSeries({
    priceFormat:{type:'volume'},
    priceScaleId:'vol',
    scaleMargins:{top:0.85,bottom:0},
  });
  vSeries.setData(validCandles.map(c=>({time:c.time,value:c.volume,
    color:c.close>=c.open?'rgba(63,185,80,0.18)':'rgba(248,81,73,0.18)'})));

  btChart.timeScale().fitContent();
  const ro=new ResizeObserver(()=>{ if(btChart) btChart.applyOptions({width:el.clientWidth}); });
  ro.observe(el);
}
